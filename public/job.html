<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCN — Job Status</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #4ade80;
      --green-d:  #166534;
      --red:      #f87171;
      --red-g:    rgba(248,113,113,0.07);
      --bg:       #030303;
      --surface:  #000000;
      --border:   rgba(255,255,255,0.05);
      --border-h: rgba(74,222,128,0.2);
      --muted:    #4b7a4b;
      --text:     #d1fae5;
      --dim:      #6b9e6b;
      --label:    #86c986;
    }

    html { scrollbar-width: thin; scrollbar-color: var(--green-d) transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 36px 24px 80px;
      max-width: 740px;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none; z-index: 100;
    }
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    * { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-left img { height: 28px; width: 28px; object-fit: contain; }
    .cursor {
      display: inline-block; width: 10px; height: 2px;
      background: var(--green); vertical-align: middle; margin-left: 4px;
      animation: cursor-blink 1s step-end infinite;
    }

    header h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; color: var(--green);
      letter-spacing: 2px; text-transform: uppercase;
    }
    header a {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--dim);
      text-decoration: none; letter-spacing: 1px;
      border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 4px;
      transition: all 0.15s;
    }
    header a:hover { color: var(--text); border-color: rgba(57,211,83,0.3); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px; padding: 22px 28px;
      margin-bottom: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.03);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover {
      border-color: var(--border-h);
      box-shadow: 0 8px 40px rgba(0,0,0,0.95), 0 0 0 1px rgba(74,222,128,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .card-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--green);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title::before { content: "//"; color: var(--green-d); font-size: 12px; }
    .card-title::after  { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

    /* ── Badge ── */
    .status-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; font-weight: 400;
      padding: 4px 14px; border-radius: 3px;
      display: inline-flex; align-items: center; gap: 8px;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .badge-pending { background: rgba(245,158,11,0.08);   color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .badge-running { background: rgba(74,222,128,0.08);   color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .badge-done    { background: rgba(96,165,250,0.08);   color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }
    .badge-failed  { background: var(--red-g);             color: var(--red);  border: 1px solid rgba(248,113,113,0.25); }

    .dot-live {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 8px var(--green);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .status-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--dim); letter-spacing: 0.5px;
    }

    .status-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--dim); letter-spacing: 0.5px;
    }
    .meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted); line-height: 2.2; letter-spacing: 0.3px;
    }
    .meta span { color: var(--dim); }

    /* ── Log ── */
    #log {
      background: #000;
      border: 1px solid rgba(57,211,83,0.08);
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 11px; line-height: 1.8; color: var(--muted);
      height: 230px; overflow-y: auto;
      font-family: 'Share Tech Mono', monospace;
      white-space: pre-wrap; word-break: break-all;
      scrollbar-width: thin; scrollbar-color: var(--green-d) transparent;
    }
    #log::before {
      content: "root@rcn:~# tail -f crawl.log\A";
      color: var(--green-d); display: block; margin-bottom: 8px;
      white-space: pre;
    }

    /* ── Results ── */
    .result-item {
      border: 1px solid rgba(57,211,83,0.08);
      border-radius: 6px; padding: 14px 16px;
      margin-bottom: 10px;
      background: #000;
      transition: border-color 0.15s;
    }
    .result-item:hover { border-color: rgba(57,211,83,0.2); }
    .result-title {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-bottom: 5px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .result-url {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted);
      word-break: break-all; margin-bottom: 10px;
    }
    .result-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .rbadge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; padding: 2px 10px; border-radius: 3px;
      font-weight: 400; letter-spacing: 1px; text-transform: uppercase;
    }
    .rb-onion { background: rgba(248,113,113,0.1);  color: #fca5a5; border: 1px solid rgba(248,113,113,0.25); }
    .rb-clear { background: rgba(96,165,250,0.1);   color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }
    .rb-term  { background: rgba(74,222,128,0.1);   color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
    .rb-dl    { background: rgba(251,191,36,0.1);   color: #fde68a; border: 1px solid rgba(251,191,36,0.25); }

    /* ── Buttons ── */
    .export-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 4px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; border: none; text-decoration: none;
      transition: all 0.15s;
    }
    .btn-blue  { background: rgba(88,166,255,0.06); border: 1px solid rgba(88,166,255,0.2); color: #60a5fa; }
    .btn-blue:hover  { background: rgba(88,166,255,0.12); box-shadow: 0 0 16px rgba(88,166,255,0.1); }
    .btn-amber { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2); color: #f59e0b; }
    .btn-amber:hover { background: rgba(245,158,11,0.12); }

    #empty {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--muted);
      padding: 28px 0; text-align: center; letter-spacing: 1px;
    }
    #empty::before { content: "// "; color: var(--green-d); }

    /* ── Footer ── */
    footer {
      text-align: center; margin-top: 48px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 1px;
    }
    footer a { color: var(--dim); text-decoration: none; }

    @media print {
      body { background:#fff; color:#000; }
      body::before, body::after { display:none; }
      header a, .export-row, #log, .card:has(#log) { display:none !important; }
      .result-item { border:1px solid #ddd; background:#fff; break-inside:avoid; }
      .result-title,.result-url { color:#000; }
      .rbadge { border:1px solid #ccc; color:#333; background:#f5f5f5; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="/logo.png" alt="RCN">
    <h1>// Job Monitor<span class="cursor"></span></h1>
  </div>
  <a href="/">&#8592; New crawl</a>
</header>

<div class="card">
  <div class="status-row">
    <span id="badge" class="badge badge-pending">pending</span>
    <span id="status-text" class="status-text">waiting in queue...</span>
  </div>
  <div class="meta" id="meta"></div>
</div>

<div class="card">
  <div class="card-title">Live Output</div>
  <div id="log">Waiting for job to start…</div>
</div>

<div class="card">
  <div class="card-title">Extracted Results</div>
  <div class="export-row" id="export-row" style="display:none">
    <a id="btn-download" class="btn btn-blue" href="#">[ download json.gz ]</a>
    <button class="btn btn-amber" onclick="window.print()">[ export pdf ]</button>
  </div>
  <div id="results-list"></div>
  <div id="empty">results will appear here when the crawl finishes</div>
</div>

<footer>
  RCN &nbsp;&middot;&nbsp; for research use only
</footer>

<script>
const jobId = new URLSearchParams(location.search).get("id");
if (!jobId) location.href = "/";

let logOffset = 0;
let polling   = null;

const badgeEl    = document.getElementById("badge");
const statusText = document.getElementById("status-text");
const metaEl     = document.getElementById("meta");
const logEl      = document.getElementById("log");
const resultsList= document.getElementById("results-list");
const emptyEl    = document.getElementById("empty");
const exportRow  = document.getElementById("export-row");

document.getElementById("btn-download").href = `/api/jobs/${jobId}/download`;

const BADGE_MAP = {
  pending: ["badge-pending", "waiting in queue..."],
  running: ["badge-running", "crawl in progress..."],
  done:    ["badge-done",    "operation complete"],
  failed:  ["badge-failed",  "operation failed"],
};

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function colorLog(line) {
  if (/error|fail/i.test(line))                    return `<span style="color:#ff4444">${esc(line)}</span>`;
  if (/warn/i.test(line))                          return `<span style="color:#f59e0b">${esc(line)}</span>`;
  if (/✓|done|success|graph|circuit/i.test(line))  return `<span style="color:#39d353">${esc(line)}</span>`;
  if (/\[server\]/i.test(line))                    return `<span style="color:#1a3a1a">${esc(line)}</span>`;
  return `<span style="color:#3a5a3a">${esc(line)}</span>`;
}

function renderPage(p) {
  const isOnion = (p.baseHost ?? "").endsWith(".onion");
  const terms   = p.matchedTerms ?? [];
  const dls     = p.downloads ?? [];
  const title   = p.meta?.title ?? p.url;
  return `<div class="result-item">
    <div class="result-title">${esc(title)}</div>
    <div class="result-url">${esc(p.url)}</div>
    <div class="result-meta">
      ${isOnion ? '<span class="rbadge rb-onion">.onion</span>' : '<span class="rbadge rb-clear">clearnet</span>'}
      ${terms.map(t => `<span class="rbadge rb-term">${esc(t)}</span>`).join("")}
      ${dls.length ? `<span class="rbadge rb-dl">&#8659; ${dls.length} files</span>` : ""}
    </div>
  </div>`;
}

async function poll() {
  try {
    const job = await fetch(`/api/jobs/${jobId}`).then(r => r.json());

    const [cls, text] = BADGE_MAP[job.status] ?? ["badge-pending", job.status];
    badgeEl.className = `badge ${cls}`;
    badgeEl.innerHTML = job.status === "running"
      ? `<div class="dot-live"></div>${job.status}`
      : job.status;
    statusText.textContent = text;

    metaEl.innerHTML = [
      `<span>target:</span> ${esc(job.url)}`,
      job.search_terms ? `<span>terms:</span> ${esc(job.search_terms)}` : "",
      job.started_at   ? `<span>started:</span> ${new Date(job.started_at).toLocaleTimeString()}` : "",
      job.finished_at  ? `<span>finished:</span> ${new Date(job.finished_at).toLocaleTimeString()}` : "",
      job.page_count   ? `<span>pages:</span> ${job.page_count}` : "",
      job.error        ? `<span style="color:#ff4444">error:</span> ${esc(job.error)}` : "",
    ].filter(Boolean).join(" &nbsp;&middot;&nbsp; ");

    const log     = job.log ?? "";
    const newPart = log.slice(logOffset);
    if (newPart) {
      logOffset = log.length;
      const atBottom = logEl.scrollHeight - logEl.scrollTop <= logEl.clientHeight + 20;
      const lines = newPart.split("\n").filter(Boolean).map(colorLog).join("\n");
      if (logEl.textContent === "Waiting for job to start…") logEl.innerHTML = "";
      logEl.innerHTML += lines + "\n";
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    if (job.status === "done" || job.status === "failed") {
      clearInterval(polling);
      if (job.status === "done") {
        const r = await fetch(`/api/jobs/${jobId}/results`).then(res => res.json());
        const pages = r.pages ?? [];
        if (pages.length) {
          emptyEl.style.display = "none";
          exportRow.style.display = "flex";
          resultsList.innerHTML = pages.map(renderPage).join("");
        } else {
          emptyEl.textContent = "no matching pages found";
        }
      }
    }
  } catch (err) {
    console.error(err);
  }
}

poll();
polling = setInterval(poll, 3000);
</script>
</body>
</html>
