<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCN — Job Status</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/job.css">
</head>
<body>

<div class="page-glow"></div>

<nav class="nav">
  <a href="/" class="nav-logo">R<span>C</span>N</a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/#projects" class="nav-link">Projects</a>
    <a href="/typosquat.html" class="nav-link">Typosquat</a>
    <a href="/contact.html" class="nav-link">Contact</a>
  </div>
  <div class="nav-right">
    <a href="/crawler.html" class="nav-back">← New crawl</a>
    <a href="/contact.html" class="nav-cta">Get in touch</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-header-left">
      <img src="/logo.png" alt="RCN">
      <h1>Job <span>Monitor</span></h1>
    </div>
    <a href="/crawler.html" class="back-btn">← New crawl</a>
  </div>

  <div class="card">
    <div class="status-row">
      <span id="badge" class="badge badge-pending">pending</span>
      <span id="status-text" class="status-text">Waiting in queue…</span>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <div class="card">
    <div class="card-title">Live Output</div>
    <div id="log">Waiting for job to start…</div>
  </div>

  <div class="card">
    <div class="card-title">Extracted Results</div>
    <div class="export-row" id="export-row" style="display:none">
      <a id="btn-download" class="btn btn-primary" href="#">&#8659; Download JSON.gz</a>
      <button class="btn btn-ghost" onclick="window.print()">&#128438; Export PDF</button>
    </div>
    <div id="results-list"></div>
    <div id="empty">Results will appear here when the crawl finishes.</div>
  </div>

  <div class="page-footer">
    RCN &nbsp;·&nbsp; for research use only &nbsp;·&nbsp; <a href="/privacy.html">Privacy Policy</a>
  </div>

</div>

<script src="/js/grain.js"></script>
<script src="/js/job.js"></script>
</body>
</html>
