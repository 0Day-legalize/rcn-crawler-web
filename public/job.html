<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCN — Job Status</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #4ade80;
      --green-dim:  #166534;
      --red:        #fca5a5;
      --red-border: rgba(252,165,165,0.2);
      --bg:         #0a0a0a;
      --surface:    #111111;
      --border:     rgba(255,255,255,0.07);
      --border-h:   rgba(74,222,128,0.25);
      --text:       #e2e8f0;
      --text-sec:   #94a3b8;
      --text-dim:   #64748b;
      --label:      #cbd5e1;
    }

    html { scrollbar-width: thin; scrollbar-color: #1e3a2a transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 36px 24px 80px;
      max-width: 740px;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none; z-index: 100;
    }
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }
    * { position: relative; z-index: 1; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    /* ── Header ── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-left img { height: 30px; width: 30px; object-fit: contain; }

    .cursor {
      display: inline-block; width: 10px; height: 2px;
      background: var(--green); vertical-align: middle; margin-left: 4px;
      animation: blink 1s step-end infinite;
    }

    header h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; color: var(--green);
      letter-spacing: 2px; text-transform: uppercase;
    }
    header a {
      font-size: 13px; color: var(--text-dim);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 7px 14px; border-radius: 6px;
      transition: all 0.15s;
    }
    header a:hover { color: var(--text-sec); border-color: rgba(255,255,255,0.12); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 24px 28px;
      margin-bottom: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--border-h); }

    .card-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--green);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title::before { content: "//"; color: var(--green-dim); font-size: 13px; }
    .card-title::after  { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

    /* ── Status ── */
    .status-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; padding: 5px 14px; border-radius: 4px;
      display: inline-flex; align-items: center; gap: 8px;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .badge-pending { background: rgba(251,191,36,0.08);  color: #fde68a; border: 1px solid rgba(251,191,36,0.2); }
    .badge-running { background: rgba(74,222,128,0.08);  color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
    .badge-done    { background: rgba(96,165,250,0.08);  color: #bfdbfe; border: 1px solid rgba(96,165,250,0.2); }
    .badge-failed  { background: rgba(252,165,165,0.08); color: var(--red); border: 1px solid var(--red-border); }

    .dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.2s infinite; box-shadow: 0 0 6px var(--green); }

    .status-text { font-size: 14px; color: var(--text-sec); }

    .meta { font-size: 13px; color: var(--text-dim); line-height: 2; }
    .meta span { color: var(--text-sec); }

    /* ── Log ── */
    #log {
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px; padding: 16px 18px;
      font-size: 12px; line-height: 1.8; color: var(--text-dim);
      height: 240px; overflow-y: auto;
      font-family: 'Share Tech Mono', monospace;
      white-space: pre-wrap; word-break: break-all;
      scrollbar-width: thin; scrollbar-color: #1e3a2a transparent;
    }

    /* ── Results ── */
    .result-item {
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 18px;
      margin-bottom: 10px; background: #0d0d0d;
      transition: border-color 0.15s;
    }
    .result-item:hover { border-color: var(--border-h); }
    .result-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-url { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); word-break: break-all; margin-bottom: 10px; }
    .result-meta { display: flex; gap: 6px; flex-wrap: wrap; }

    .rbadge { font-family: 'Share Tech Mono', monospace; font-size: 10px; padding: 3px 10px; border-radius: 4px; font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; }
    .rb-onion { background: rgba(252,165,165,0.08); color: var(--red);  border: 1px solid var(--red-border); }
    .rb-clear { background: rgba(96,165,250,0.08);  color: #93c5fd; border: 1px solid rgba(96,165,250,0.2); }
    .rb-term  { background: rgba(74,222,128,0.08);  color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .rb-dl    { background: rgba(251,191,36,0.08);  color: #fde68a; border: 1px solid rgba(251,191,36,0.2); }

    /* ── Export buttons ── */
    .export-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; border: none; text-decoration: none; transition: all 0.15s;
    }
    .btn-blue  { background: rgba(96,165,250,0.07); border: 1px solid rgba(96,165,250,0.2); color: #93c5fd; }
    .btn-blue:hover  { background: rgba(96,165,250,0.13); }
    .btn-amber { background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2); color: #fde68a; }
    .btn-amber:hover { background: rgba(251,191,36,0.13); }

    #empty { font-size: 14px; color: var(--text-dim); padding: 28px 0; text-align: center; }

    /* ── Footer ── */
    footer { text-align: center; margin-top: 48px; font-size: 12px; color: var(--text-dim); }
    footer a { color: var(--text-dim); text-decoration: none; }

    @media print {
      body { background:#fff; color:#000; }
      body::before, body::after { display:none; }
      header a, .export-row, #log, .card:has(#log) { display:none !important; }
      .result-item { border:1px solid #ddd; background:#fff; break-inside:avoid; }
      .result-title,.result-url { color:#000; }
      .rbadge { border:1px solid #ccc; color:#333; background:#f5f5f5; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="/logo.png" alt="RCN">
    <h1>// Job Monitor<span class="cursor"></span></h1>
  </div>
  <a href="/">&#8592; New crawl</a>
</header>

<div class="card">
  <div class="status-row">
    <span id="badge" class="badge badge-pending">pending</span>
    <span id="status-text" class="status-text">Waiting in queue…</span>
  </div>
  <div class="meta" id="meta"></div>
</div>

<div class="card">
  <div class="card-title">Live Output</div>
  <div id="log">Waiting for job to start…</div>
</div>

<div class="card">
  <div class="card-title">Extracted Results</div>
  <div class="export-row" id="export-row" style="display:none">
    <a id="btn-download" class="btn btn-blue" href="#">[ download json.gz ]</a>
    <button class="btn btn-amber" onclick="window.print()">[ export pdf ]</button>
  </div>
  <div id="results-list"></div>
  <div id="empty">Results will appear here when the crawl finishes.</div>
</div>

<footer>
  RCN &nbsp;&middot;&nbsp; for research use only &nbsp;&middot;&nbsp; <a href="/privacy.html">Privacy Policy</a>
</footer>

<script>
const jobId = new URLSearchParams(location.search).get("id");
if (!jobId) location.href = "/";

let logOffset = 0;
let polling   = null;

const badgeEl    = document.getElementById("badge");
const statusText = document.getElementById("status-text");
const metaEl     = document.getElementById("meta");
const logEl      = document.getElementById("log");
const resultsList= document.getElementById("results-list");
const emptyEl    = document.getElementById("empty");
const exportRow  = document.getElementById("export-row");

document.getElementById("btn-download").href = `/api/jobs/${jobId}/download`;

const BADGE_MAP = {
  pending: ["badge-pending", "Waiting in queue…"],
  running: ["badge-running", "Crawl in progress…"],
  done:    ["badge-done",    "Operation complete"],
  failed:  ["badge-failed",  "Operation failed"],
};

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function colorLog(line) {
  if (/error|fail/i.test(line))                   return `<span style="color:#fca5a5">${line}</span>`;
  if (/warn/i.test(line))                         return `<span style="color:#fde68a">${line}</span>`;
  if (/✓|done|success|graph|circuit/i.test(line)) return `<span style="color:#4ade80">${line}</span>`;
  return `<span style="color:#64748b">${line}</span>`;
}

function renderPage(p) {
  const isOnion = (p.baseHost ?? "").endsWith(".onion");
  const terms   = p.matchedTerms ?? [];
  const dls     = p.downloads ?? [];
  const title   = p.meta?.title ?? p.url;
  return `<div class="result-item">
    <div class="result-title">${esc(title)}</div>
    <div class="result-url">${esc(p.url)}</div>
    <div class="result-meta">
      ${isOnion ? '<span class="rbadge rb-onion">.onion</span>' : '<span class="rbadge rb-clear">clearnet</span>'}
      ${terms.map(t => `<span class="rbadge rb-term">${esc(t)}</span>`).join("")}
      ${dls.length ? `<span class="rbadge rb-dl">&#8659; ${dls.length} files</span>` : ""}
    </div>
  </div>`;
}

async function poll() {
  try {
    const job = await fetch(`/api/jobs/${jobId}`).then(r => r.json());

    const [cls, text] = BADGE_MAP[job.status] ?? ["badge-pending", job.status];
    badgeEl.className = `badge ${cls}`;
    badgeEl.innerHTML = job.status === "running"
      ? `<div class="dot-live"></div>${job.status}`
      : job.status;
    statusText.textContent = text;

    metaEl.innerHTML = [
      `<span>Target:</span> ${esc(job.url)}`,
      job.search_terms ? `<span>Terms:</span> ${esc(job.search_terms)}` : "",
      job.started_at   ? `<span>Started:</span> ${new Date(job.started_at).toLocaleTimeString()}` : "",
      job.finished_at  ? `<span>Finished:</span> ${new Date(job.finished_at).toLocaleTimeString()}` : "",
      job.page_count   ? `<span>Pages:</span> ${job.page_count}` : "",
      job.error        ? `<span style="color:#fca5a5">Error:</span> ${esc(job.error)}` : "",
    ].filter(Boolean).join(" &nbsp;&middot;&nbsp; ");

    const log     = job.log ?? "";
    const newPart = log.slice(logOffset);
    if (newPart) {
      logOffset = log.length;
      const atBottom = logEl.scrollHeight - logEl.scrollTop <= logEl.clientHeight + 20;
      const lines = newPart.split("\n").filter(Boolean).map(colorLog).join("\n");
      if (logEl.textContent === "Waiting for job to start…") logEl.innerHTML = "";
      logEl.innerHTML += lines + "\n";
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    if (job.status === "done" || job.status === "failed") {
      clearInterval(polling);
      if (job.status === "done") {
        const r = await fetch(`/api/jobs/${jobId}/results`).then(res => res.json());
        const pages = r.pages ?? [];
        if (pages.length) {
          emptyEl.style.display = "none";
          exportRow.style.display = "flex";
          resultsList.innerHTML = pages.map(renderPage).join("");
        } else {
          emptyEl.textContent = "No matching pages found.";
        }
      }
    }
  } catch (err) {
    console.error(err);
  }
}

poll();
polling = setInterval(poll, 3000);
</script>
</body>
</html>
