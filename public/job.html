<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCN — Job Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; padding: 40px 24px;
      max-width: 720px; margin: 0 auto;
    }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    header h1 { font-size: 20px; font-weight: 700; }
    header a  { font-size: 12px; color: #4b5563; text-decoration: none; }
    header a:hover { color: #8b949e; }

    .card { background: rgba(22,27,34,0.8); border: 1px solid #21262d; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 13px; font-weight: 600; color: #e6edf3; margin-bottom: 14px; }

    /* Status badge */
    .status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .badge {
      font-size: 11px; font-weight: 500; padding: 3px 10px;
      border-radius: 12px; display: inline-flex; align-items: center; gap: 6px;
    }
    .badge-pending  { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid #f59e0b30; }
    .badge-running  { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid #22c55e30; }
    .badge-done     { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid #58a6ff30; }
    .badge-failed   { background: rgba(248,81,73,0.15);  color: #f85149; border: 1px solid #f8514930; }
    .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .meta { font-size: 11px; color: #4b5563; line-height: 1.9; }
    .meta span { color: #6b7280; }

    /* Log */
    #log {
      background: #010409; border: 1px solid #21262d; border-radius: 8px;
      padding: 12px 14px; font-size: 11px; line-height: 1.7; color: #4b5563;
      height: 200px; overflow-y: auto; font-family: monospace;
      white-space: pre-wrap; word-break: break-all;
    }

    /* Results */
    .result-item { border: 1px solid #21262d; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; background: #010409; }
    .result-title { font-size: 13px; font-weight: 500; color: #e6edf3; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-url   { font-size: 10px; color: #4b5563; word-break: break-all; margin-bottom: 8px; }
    .result-meta  { display: flex; gap: 8px; flex-wrap: wrap; }
    .rbadge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .rb-onion  { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid #a855f730; }
    .rb-clear  { background: rgba(59,130,246,0.15);  color: #3b82f6; border: 1px solid #3b82f630; }
    .rb-term   { background: rgba(34,197,94,0.15);   color: #22c55e; border: 1px solid #22c55e30; }
    .rb-dl     { background: rgba(245,158,11,0.15);  color: #f59e0b; border: 1px solid #f59e0b30; }

    .export-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 8px; font-size: 12px;
      font-weight: 500; cursor: pointer; border: none; text-decoration: none;
      transition: background 0.15s;
    }
    .btn-blue   { background: rgba(88,166,255,0.1); border: 1px solid #58a6ff50; color: #58a6ff; }
    .btn-blue:hover { background: rgba(88,166,255,0.2); }
    .btn-amber  { background: rgba(245,158,11,0.1); border: 1px solid #f59e0b50; color: #f59e0b; }
    .btn-amber:hover { background: rgba(245,158,11,0.2); }

    #empty { font-size: 13px; color: #4b5563; padding: 24px 0; text-align: center; }

    footer { text-align: center; margin-top: 40px; font-size: 11px; color: #374151; }
    footer a { color: #4b5563; text-decoration: none; }

    @media print {
      body { background:#fff; color:#000; }
      header a, .export-row, #log, .card:has(#log) { display:none !important; }
      .result-item { border:1px solid #ddd; background:#fff; break-inside:avoid; }
      .result-title,.result-url { color:#000; }
      .rbadge { border:1px solid #ccc; color:#333; background:#f5f5f5; }
    }
  </style>
</head>
<body>

<header>
  <h1>🕷️ Job Status</h1>
  <a href="/">← New crawl</a>
</header>

<!-- Status card -->
<div class="card">
  <div class="status-row">
    <span id="badge" class="badge badge-pending">pending</span>
    <span id="status-text" style="font-size:12px;color:#8b949e">Waiting in queue…</span>
  </div>
  <div class="meta" id="meta"></div>
</div>

<!-- Log card -->
<div class="card">
  <div class="card-title">Live log</div>
  <div id="log">Waiting for job to start…</div>
</div>

<!-- Results card -->
<div class="card">
  <div class="card-title">Results</div>
  <div class="export-row" id="export-row" style="display:none">
    <a id="btn-download" class="btn btn-blue" href="#">⬇ Download JSON.gz</a>
    <button class="btn btn-amber" onclick="window.print()">🖨 Export PDF</button>
  </div>
  <div id="results-list"></div>
  <div id="empty">Results will appear here when the crawl finishes.</div>
</div>

<footer>
  Built by <a href="https://github.com/0Day-legalize">RCN</a> &nbsp;·&nbsp; For research use only
</footer>

<script>
const jobId = new URLSearchParams(location.search).get("id");
if (!jobId) location.href = "/";

let logOffset = 0;
let polling   = null;

const badgeEl    = document.getElementById("badge");
const statusText = document.getElementById("status-text");
const metaEl     = document.getElementById("meta");
const logEl      = document.getElementById("log");
const resultsList= document.getElementById("results-list");
const emptyEl    = document.getElementById("empty");
const exportRow  = document.getElementById("export-row");

document.getElementById("btn-download").href = `/api/jobs/${jobId}/download`;

const BADGE_MAP = {
  pending: ["badge-pending", "Waiting in queue…"],
  running: ["badge-running", "Crawl in progress…"],
  done:    ["badge-done",    "Finished"],
  failed:  ["badge-failed",  "Failed"],
};

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function colorLog(line) {
  if (/error|fail/i.test(line))        return `<span style="color:#f85149">${esc(line)}</span>`;
  if (/warn/i.test(line))              return `<span style="color:#f59e0b">${esc(line)}</span>`;
  if (/✓|done|success|graph|circuit/i.test(line)) return `<span style="color:#3fb950">${esc(line)}</span>`;
  if (/\[server\]/i.test(line))        return `<span style="color:#4b5563">${esc(line)}</span>`;
  return `<span style="color:#58a6ff">${esc(line)}</span>`;
}

function renderPage(p) {
  const isOnion = (p.baseHost ?? "").endsWith(".onion");
  const terms   = p.matchedTerms ?? [];
  const dls     = p.downloads ?? [];
  const title   = p.meta?.title ?? p.url;
  return `<div class="result-item">
    <div class="result-title">${esc(title)}</div>
    <div class="result-url">${esc(p.url)}</div>
    <div class="result-meta">
      ${isOnion ? '<span class="rbadge rb-onion">.onion</span>' : '<span class="rbadge rb-clear">clearnet</span>'}
      ${terms.map(t => `<span class="rbadge rb-term">${esc(t)}</span>`).join("")}
      ${dls.length ? `<span class="rbadge rb-dl">⬇ ${dls.length} downloads</span>` : ""}
    </div>
  </div>`;
}

async function poll() {
  try {
    const job = await fetch(`/api/jobs/${jobId}`).then(r => r.json());

    // Badge + status text
    const [cls, text] = BADGE_MAP[job.status] ?? ["badge-pending", job.status];
    badgeEl.className = `badge ${cls}`;
    badgeEl.innerHTML = job.status === "running"
      ? `<div class="dot-live"></div> running`
      : job.status;
    statusText.textContent = text;

    // Meta
    metaEl.innerHTML = [
      `<span>URL:</span> ${esc(job.url)}`,
      job.search_terms ? `<span>Terms:</span> ${esc(job.search_terms)}` : "",
      job.started_at   ? `<span>Started:</span> ${new Date(job.started_at).toLocaleTimeString()}` : "",
      job.finished_at  ? `<span>Finished:</span> ${new Date(job.finished_at).toLocaleTimeString()}` : "",
      job.page_count   ? `<span>Pages found:</span> ${job.page_count}` : "",
      job.error        ? `<span style="color:#f85149">Error:</span> ${esc(job.error)}` : "",
    ].filter(Boolean).join(" &nbsp;·&nbsp; ");

    // Log (append new lines only)
    const log     = job.log ?? "";
    const newPart = log.slice(logOffset);
    if (newPart) {
      logOffset = log.length;
      const atBottom = logEl.scrollHeight - logEl.scrollTop <= logEl.clientHeight + 20;
      const lines = newPart.split("\n").filter(Boolean).map(colorLog).join("\n");
      if (logEl.textContent === "Waiting for job to start…") logEl.innerHTML = "";
      logEl.innerHTML += lines + "\n";
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    // Results when done
    if (job.status === "done" || job.status === "failed") {
      clearInterval(polling);
      if (job.status === "done") {
        const r = await fetch(`/api/jobs/${jobId}/results`).then(res => res.json());
        const pages = r.pages ?? [];
        if (pages.length) {
          emptyEl.style.display = "none";
          exportRow.style.display = "flex";
          resultsList.innerHTML = pages.map(renderPage).join("");
        } else {
          emptyEl.textContent = "No matching pages found.";
        }
      }
    }
  } catch (err) {
    console.error(err);
  }
}

poll();
polling = setInterval(poll, 3000);
</script>
</body>
</html>
