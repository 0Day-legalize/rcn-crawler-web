<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCN — Job Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #04080f;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 24px 64px;
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: "";
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,212,170,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    * { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { height: 30px; width: 30px; object-fit: contain; }
    header h1 { font-size: 18px; font-weight: 700; color: #e6edf3; }
    header a {
      font-size: 12px; color: #374151; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 6px 12px; border-radius: 6px;
      transition: all 0.15s;
    }
    header a:hover { color: #6b7280; border-color: rgba(255,255,255,0.1); }

    /* ── Cards ── */
    .card {
      background: rgba(13,18,26,0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }
    .card-title {
      font-size: 11px; font-weight: 600; color: #00d4aa;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ""; display: inline-block; width: 3px; height: 12px;
      background: #00d4aa; border-radius: 2px;
    }

    /* ── Status ── */
    .status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 4px 12px;
      border-radius: 20px; display: inline-flex; align-items: center; gap: 7px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-pending { background: rgba(245,158,11,0.1);  color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
    .badge-running { background: rgba(0,212,170,0.1);   color: #00d4aa; border: 1px solid rgba(0,212,170,0.25); }
    .badge-done    { background: rgba(88,166,255,0.1);  color: #58a6ff; border: 1px solid rgba(88,166,255,0.25); }
    .badge-failed  { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }

    .dot-live {
      width: 7px; height: 7px; border-radius: 50%; background: #00d4aa;
      animation: pulse 1.4s infinite;
      box-shadow: 0 0 6px #00d4aa;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.85)} }

    .status-text { font-size: 12px; color: #4b5563; }

    .meta { font-size: 11px; color: #374151; line-height: 2; }
    .meta span { color: #4b5563; }

    /* ── Log ── */
    #log {
      background: rgba(4,8,15,0.8);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 11px; line-height: 1.8; color: #374151;
      height: 220px; overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      white-space: pre-wrap; word-break: break-all;
      scrollbar-width: thin; scrollbar-color: #1f2937 transparent;
    }

    /* ── Results ── */
    .result-item {
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 10px;
      background: rgba(4,8,15,0.6);
      transition: border-color 0.15s;
    }
    .result-item:hover { border-color: rgba(0,212,170,0.15); }
    .result-title {
      font-size: 13px; font-weight: 500; color: #e6edf3;
      margin-bottom: 5px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .result-url {
      font-size: 10px; color: #374151;
      word-break: break-all; margin-bottom: 10px;
      font-family: 'Consolas', monospace;
    }
    .result-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .rbadge {
      font-size: 10px; padding: 2px 9px; border-radius: 10px;
      font-weight: 600; letter-spacing: 0.3px;
    }
    .rb-onion { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.25); }
    .rb-clear { background: rgba(59,130,246,0.12);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .rb-term  { background: rgba(0,212,170,0.1);    color: #00d4aa; border: 1px solid rgba(0,212,170,0.25); }
    .rb-dl    { background: rgba(245,158,11,0.1);   color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }

    /* ── Export buttons ── */
    .export-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: none; text-decoration: none;
      transition: all 0.15s; letter-spacing: 0.3px;
    }
    .btn-blue {
      background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.25); color: #58a6ff;
    }
    .btn-blue:hover { background: rgba(88,166,255,0.15); box-shadow: 0 0 16px rgba(88,166,255,0.1); }
    .btn-amber {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); color: #f59e0b;
    }
    .btn-amber:hover { background: rgba(245,158,11,0.15); }

    #empty { font-size: 13px; color: #374151; padding: 28px 0; text-align: center; }

    /* ── Footer ── */
    footer { text-align: center; margin-top: 48px; font-size: 11px; color: #1f2937; }
    footer a { color: #374151; text-decoration: none; }

    @media print {
      body { background:#fff; color:#000; }
      body::before, body::after { display:none; }
      header a, .export-row, #log, .card:has(#log) { display:none !important; }
      .result-item { border:1px solid #ddd; background:#fff; break-inside:avoid; }
      .result-title,.result-url { color:#000; }
      .rbadge { border:1px solid #ccc; color:#333; background:#f5f5f5; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="/logo.png" alt="RCN">
    <h1>Job Status</h1>
  </div>
  <a href="/">&#8592; New crawl</a>
</header>

<div class="card">
  <div class="status-row">
    <span id="badge" class="badge badge-pending">pending</span>
    <span id="status-text" class="status-text">Waiting in queue…</span>
  </div>
  <div class="meta" id="meta"></div>
</div>

<div class="card">
  <div class="card-title">Live log</div>
  <div id="log">Waiting for job to start…</div>
</div>

<div class="card">
  <div class="card-title">Results</div>
  <div class="export-row" id="export-row" style="display:none">
    <a id="btn-download" class="btn btn-blue" href="#">&#8659; Download JSON.gz</a>
    <button class="btn btn-amber" onclick="window.print()">&#128438; Export PDF</button>
  </div>
  <div id="results-list"></div>
  <div id="empty">Results will appear here when the crawl finishes.</div>
</div>

<footer>
  Built by <a href="https://github.com/0Day-legalize">RCN</a> &nbsp;&middot;&nbsp; For research use only
</footer>

<script>
const jobId = new URLSearchParams(location.search).get("id");
if (!jobId) location.href = "/";

let logOffset = 0;
let polling   = null;

const badgeEl    = document.getElementById("badge");
const statusText = document.getElementById("status-text");
const metaEl     = document.getElementById("meta");
const logEl      = document.getElementById("log");
const resultsList= document.getElementById("results-list");
const emptyEl    = document.getElementById("empty");
const exportRow  = document.getElementById("export-row");

document.getElementById("btn-download").href = `/api/jobs/${jobId}/download`;

const BADGE_MAP = {
  pending: ["badge-pending", "Waiting in queue…"],
  running: ["badge-running", "Crawl in progress…"],
  done:    ["badge-done",    "Finished"],
  failed:  ["badge-failed",  "Failed"],
};

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function colorLog(line) {
  if (/error|fail/i.test(line))                          return `<span style="color:#f87171">${esc(line)}</span>`;
  if (/warn/i.test(line))                                return `<span style="color:#f59e0b">${esc(line)}</span>`;
  if (/✓|done|success|graph|circuit/i.test(line))        return `<span style="color:#00d4aa">${esc(line)}</span>`;
  if (/\[server\]/i.test(line))                          return `<span style="color:#1f2937">${esc(line)}</span>`;
  return `<span style="color:#4b5563">${esc(line)}</span>`;
}

function renderPage(p) {
  const isOnion = (p.baseHost ?? "").endsWith(".onion");
  const terms   = p.matchedTerms ?? [];
  const dls     = p.downloads ?? [];
  const title   = p.meta?.title ?? p.url;
  return `<div class="result-item">
    <div class="result-title">${esc(title)}</div>
    <div class="result-url">${esc(p.url)}</div>
    <div class="result-meta">
      ${isOnion ? '<span class="rbadge rb-onion">.onion</span>' : '<span class="rbadge rb-clear">clearnet</span>'}
      ${terms.map(t => `<span class="rbadge rb-term">${esc(t)}</span>`).join("")}
      ${dls.length ? `<span class="rbadge rb-dl">&#8659; ${dls.length} downloads</span>` : ""}
    </div>
  </div>`;
}

async function poll() {
  try {
    const job = await fetch(`/api/jobs/${jobId}`).then(r => r.json());

    const [cls, text] = BADGE_MAP[job.status] ?? ["badge-pending", job.status];
    badgeEl.className = `badge ${cls}`;
    badgeEl.innerHTML = job.status === "running"
      ? `<div class="dot-live"></div> running`
      : job.status;
    statusText.textContent = text;

    metaEl.innerHTML = [
      `<span>URL:</span> ${esc(job.url)}`,
      job.search_terms ? `<span>Terms:</span> ${esc(job.search_terms)}` : "",
      job.started_at   ? `<span>Started:</span> ${new Date(job.started_at).toLocaleTimeString()}` : "",
      job.finished_at  ? `<span>Finished:</span> ${new Date(job.finished_at).toLocaleTimeString()}` : "",
      job.page_count   ? `<span>Pages found:</span> ${job.page_count}` : "",
      job.error        ? `<span style="color:#f87171">Error:</span> ${esc(job.error)}` : "",
    ].filter(Boolean).join(" &nbsp;&middot;&nbsp; ");

    const log     = job.log ?? "";
    const newPart = log.slice(logOffset);
    if (newPart) {
      logOffset = log.length;
      const atBottom = logEl.scrollHeight - logEl.scrollTop <= logEl.clientHeight + 20;
      const lines = newPart.split("\n").filter(Boolean).map(colorLog).join("\n");
      if (logEl.textContent === "Waiting for job to start…") logEl.innerHTML = "";
      logEl.innerHTML += lines + "\n";
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }

    if (job.status === "done" || job.status === "failed") {
      clearInterval(polling);
      if (job.status === "done") {
        const r = await fetch(`/api/jobs/${jobId}/results`).then(res => res.json());
        const pages = r.pages ?? [];
        if (pages.length) {
          emptyEl.style.display = "none";
          exportRow.style.display = "flex";
          resultsList.innerHTML = pages.map(renderPage).join("");
        } else {
          emptyEl.textContent = "No matching pages found.";
        }
      }
    }
  } catch (err) {
    console.error(err);
  }
}

poll();
polling = setInterval(poll, 3000);
</script>
</body>
</html>
